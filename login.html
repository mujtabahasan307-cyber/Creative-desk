<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="login.css">
  <title>Creative Desk</title>
  <link rel="icon" type="image/png" href="download.svg">
</head>
<body>
  <div class="wrapper">
    <nav class="nav">
      <div class="nav-logo">
    <a href="index.html" 
   style="color: #FFD700; text-decoration: none; font-weight: bold; font-size: 50px;">
  Creative Desk
</a>



      </div>
      <div class="nav-menu" id="navMenu">
      </div>
      <div class="nav-button">
        <button class="btn white-btn" id="loginBtn" onclick="login()">Sign In</button>
        <button class="btn" id="registerBtn" onclick="register()">Sign Up</button>
      </div>
      <div class="nav-menu-btn">
        <i class="bx bx-menu" onclick="myMenuFunction()"></i>
      </div>
    </nav>

    <!----------------------------- Form box ----------------------------------->
    <div class="form-box">

      <!------------------- login form -------------------------->
      <form class="login-container form-login" id="login">
        <div class="top">
          <span>Don't have an account? <a href="#" onclick="register()">Sign Up</a></span>
          <header>Login</header>
        </div>
        <div class="input-box">
          <input type="email" class="input-field" id="login-email" placeholder="Email" required>
          <i class="bx bx-envelope"></i>
        </div>
        <div class="input-box">
          <input type="password" class="input-field" id="login-password" placeholder="Password" required>
          <i class="bx bx-lock-alt"></i>
        </div>
        <div class="input-box">
          <input type="submit" class="submit" value="Sign In">
        </div>
        <div class="two-col">
          <div class="one">
            <input type="checkbox" id="login-check">
            <label for="login-check"> Remember Me</label>
          </div>
        </div>
      </form>

      <!------------------- registration form -------------------------->
      <form class="register-container form-signup" id="register">
        <div class="top">
          <span>Have an account? <a href="#" onclick="login()">Login</a></span>
          <header>Sign Up</header>
        </div>
        <div class="two-forms">
          <div class="input-box">
            <input type="text" class="input-field" id="signup-username" placeholder="Username" required>
            <i class="bx bx-user"></i>
          </div>
        </div>
        <div class="input-box">
          <input type="email" class="input-field" id="signup-email" placeholder="Email" required>
          <i class="bx bx-envelope"></i>
        </div>
        <div class="input-box">
          <input type="password" class="input-field" id="signup-password" placeholder="Password" required>
          <i class="bx bx-lock-alt"></i>
        </div>
        <div class="input-box">
          <input type="submit" class="submit" value="Register">
        </div>
        <div class="two-col">
          <div class="one">
            <input type="checkbox" id="register-check">
            <label for="register-check"> Remember Me</label>
          </div>
          <div class="two">
            <label><a href="#">Terms & conditions</a></label>
          </div>
        </div>
      </form>
    </div>
  </div>   
  <script src="login.js"></script>
</body>
</html>
